<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">

    <style>
        .col-8 {
            padding: 100px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-8">

                <div id="y" class="carousel slide">
                    <div class="carousel-indicators">
                        <button type="button" data-bs-target="#y" data-bs-slide-to="0" class="active"></button>
                        <button type="button" data-bs-target="#y" data-bs-slide-to="1"></button>
                        <button type="button" data-bs-target="#y" data-bs-slide-to="2"></button>
                        <button type="button" data-bs-target="#y" data-bs-slide-to="3"></button>
                    </div>
                    <div class="carousel-inner">
                        <div class="carousel-item active">
                            <img src="slide_1.jpg" class="d-block w-100">
                        </div>
                        <div class="carousel-item">
                            <img src="slide_2.jpg" class="d-block w-100">
                        </div>
                        <div class="carousel-item">
                            <img src="slide_3.jpg" class="d-block w-100">
                        </div>
                        <div class="carousel-item">
                            <img src="slide_4.jpg" class="d-block w-100">
                        </div>
                    </div>
                    <button type="button" data-bs-target="#y" data-bs-slide="prev" class="carousel-control-prev">
                        <span class="carousel-control-prev-icon"></span>
                    </button>
                    <button type="button" data-bs-target="#y" data-bs-slide="next" class="carousel-control-next">
                        <span class="carousel-control-next-icon"></span>
                    </button>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
