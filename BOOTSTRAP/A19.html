<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"> -->
    <link rel="stylesheet" href="bootstrap.min.css">

    <style>
        .container {
            border: 3px solid red;
            /* height: 200px; */
            color: white;
        }

        .red {
            background-color: red;
            height: 100px;
        }

        .green {
            background-color: green;            
            height: 100px;
        }

        .blue {
            background-color: blue;
            height: 100px;
        }

        .row {
            margin: 5px 0px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col-md-2 red">col-md-2</div>
            <div class="col-md-6 green">col-md-6</div>
            <div class="col-md-4 blue">col-md-4</div>
        </div>
        <div class="row">
            <div class="col-md-2 col-xl-4 red">col-md-2 col-xl-4</div>
            <div class="col-md-6 col-xl-3 green">col-md-6 col-xl-3</div>
            <div class="col-md-4 col-xl-5 blue">col-md-4 col-xl-5</div>
        </div>
        <div class="row">
            <div class="col-sm-2 col-md-2 col-xl-4 red">col-sm-2 col-md-2 col-xl-4</div>
            <div class="col-sm-7 col-md-6 col-xl-3 green">col-sm-7 col-md-6 col-xl-3</div>
            <div class="col-sm-3 col-md-4 col-xl-5 blue">col-sm-3 col-md-4 col-xl-5</div>
        </div>
    </div>
</body>
</html>
