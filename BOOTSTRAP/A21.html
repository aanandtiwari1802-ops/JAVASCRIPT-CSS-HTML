<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"> -->
    <link rel="stylesheet" href="bootstrap.min.css">

    <style>
        .container {
            border: 3px solid red;
            /* height: 200px; */
            color: white;
        }

        .red {
            background-color: red;
            height: 100px;
        }

        .green {
            background-color: green;            
            height: 100px;
        }

        .blue {
            background-color: blue;
            height: 100px;
        }

        .row {
            margin: 5px 0px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col-3 red">col-3</div>
            <div class="col-3 green">col-3</div>
            <div class="col-3 blue">col-3</div>
        </div>
        <div class="row d-flex justify-content-center  justify-content-sm-evenly justify-content-md-between justify-content-xl-around">
            <div class="col-3 red">col-3</div>
            <div class="col-3 green">col-3</div>
            <div class="col-3 blue">col-3</div>
        </div>
    </div>

</html>
