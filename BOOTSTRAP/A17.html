<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">

    <style>
        .container {
            border: 3px solid red;
            /* height: 200px; */
        }

        .red {
            background-color: red;
            height: 100px;
        }

        .green {
            background-color: green;            
            height: 100px;
        }

        .blue {
            background-color: blue;
            height: 100px;
        }

        .row {
            margin: 5px 0px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col-2 red"></div>
            <div class="col-6 green"></div>
            <div class="col-4 blue"></div>
        </div>
        <div class="row">
            <div class="col-md-2 red"></div>
            <div class="col-md-6 green"></div>
            <div class="col-md-4 blue"></div>
        </div>
    </div>
</body>
</html>
