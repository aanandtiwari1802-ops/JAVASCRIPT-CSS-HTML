<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">

    <style>
        .col {
            padding: 100px;
        }
    </style>
</head>
<body>
    <div class="modal fade" id="x">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">A</div>
                <div class="modal-body">B</div>
                <div class="modal-footer">C</div>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="row">
            <div class="col">
                <button type="button" class="btn btn-primary" data-bs-target="#x" data-bs-toggle="modal">Open Window...</button>
            </div>
        </div>
    </div>
    

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
