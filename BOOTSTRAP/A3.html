<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .x-primary {
            color: white;
            background-color: rgb(61, 123, 215);
            border-color: rgb(61, 123, 215);
        }

        .x-danger {
            color: white;
            background-color: rgb(222, 39, 109);
            border-color: rgb(222, 39, 109);
        }

        .x {
            font-size: 22px;
            font-weight: bold;
            border-width: 1px;
            border-style: solid;
            border-radius: 7px;
            padding: 8px 14px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <button class="x x-primary">Show Content</button>

    <br><br>

    <input type="button" class="x x-danger" value="View Info">
</body>
</html>
