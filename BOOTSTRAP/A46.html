<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
</head>
<body>    
    <div class="container">
        <div class="row">
            <div class="col">
                <div class="carousel slide" id="x">
                    <div class="carousel-inner">
                        <div class="carousel-item active">
                            <img src="slide1.jpg" class="d-block w-100">
                        </div>
                        <div class="carousel-item">
                            <img src="slide2.jpg" class="d-block w-100">
                        </div>
                        <div class="carousel-item">
                            <img src="slide3.jpg" class="d-block w-100">
                        </div>
                    </div>
                    <button type="button" class="carousel-control-prev" data-bs-target="#x" data-bs-slide="prev">
                        <span class="carousel-control-prev-icon"></span>
                    </button>
                    <button type="button" class="carousel-control-next" data-bs-target="#x" data-bs-slide="next">
                        <span class="carousel-control-next-icon"></span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
