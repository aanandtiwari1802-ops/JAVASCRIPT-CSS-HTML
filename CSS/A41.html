<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .x {
            border: 5px solid green; 
            height: 100px;
        }

        #a {
            border-style: dashed;  
        }

        #b {
              
        }

        #c {
            border-style: dotted; 
        }

        #d {
            border-style: ridge;    
        }

        #e {
            border-style: groove;   
        }

        #f {
            border-style: inset;    
        }

        #g {
            border-style: outset;    
        }
    </style>
</head>
<body>
    <div class="x" id="a"></div> <br>
    <div class="x" id="b"></div> <br> 
    <div class="x" id="c"></div> <br>
    <div class="x" id="d"></div> <br>
    <div class="x" id="e"></div> <br>
    <div class="x" id="f"></div> <br>
    <div class="x" id="g"></div>
</body>
</html>
