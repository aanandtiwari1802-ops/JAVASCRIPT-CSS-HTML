<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        #a {
            border: 5px dashed red; 
            height: 100px;   
        }

        #b {
            border: 5px solid red; 
            height: 100px;   
        }

        #c {
            border: 5px dotted red; 
            height: 100px;   
        }

        #d {
            border: 5px ridge red; 
            height: 100px;   
        }

        #e {
            border: 5px groove red; 
            height: 100px;   
        }

        #f {
            border: 5px inset red; 
            height: 100px;   
        }

        #g {
            border: 5px outset red; 
            height: 100px;   
        }
    </style>
</head>
<body>
    <div id="a"></div> <br>
    <div id="b"></div> <br> 
    <div id="c"></div> <br>
    <div id="d"></div> <br>
    <div id="e"></div> <br>
    <div id="f"></div> <br>
    <div id="g"></div>
</body>
</html>
