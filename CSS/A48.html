<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        #a {
            height: 100px;
            border: 7px solid red;
        }

        #b {
            height: 100px;
            border: 7px solid red;
            border-radius: 12px;
        }

        #c {
            height: 100px;
            border: 7px solid red;
            border-radius: 100px;
        }

        #d {
            height: 200px;
            width: 200px;
            border: 7px solid red;
            /* border-radius: 150px; */
        }
    </style>
</head>
<body>
    <div id="a"></div> <br>
    <div id="b"></div> <br>
    <div id="c"></div> <br>
    <div id="d"></div> <br>
</body>
</html>
