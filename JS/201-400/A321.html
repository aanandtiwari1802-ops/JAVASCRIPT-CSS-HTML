<!DOCTYPE html>
<html lang="en">
<head>

<body>
    <h1>Index Page</h1>

    <hr>

    <script>
        const x = [25, 10, 65, 32, 71, 48, 59, 4];

        const y = [11, 5, 32,  21, 65, 58, 7, 25];

        const z = [];
        
        for(i = 0; i < x.length; i++) {
            for(j = 0; j < y.length; j++) {
                if(x[i] == y[j]) {
                    z.push(x[i]);
                    break;
                }
            }
        }

        console.log(z);
    </script>
</body>
