<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>Index Page</h1>

    <hr>

    <script>
        const x = [2, 5, 7, 2, 8, 9, 10, 2, 5, 4, 9, 13, 2, 4, 7, 2, 9, 5, 3, 2, 7];

        let max = x[0];
        for(i=1;i<x.length;i++) {
            if(x[i] > max)
                max = x[i];
        }

        const y = new Array(max+1);

        for (i = 0; i < x.length; i++) {
            if(y[x[i]]) {
                y[x[i]]++;
            } else {
                y[x[i]] = 1;
            }
        }
            
        for(i = 0; i < y.length; i++) {
            if(y[i])
                console.log(`${i} ~ ${y[i]}`);
        }

    </script>
</body>

</html>
