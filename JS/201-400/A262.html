<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Hello World...</h1>

    <hr>

    <!-- 
        weak number: 1, 2, 3 
        strong number: 4, 5, 6 
        very strong number: 7, 8, 9 or 10
    -->

    Enter a number(1-10)
    <input type="number" id="a"> <br><br>

    <input type="button" id="btn" value="Save">

    <script>
        const a = document.getElementById('a');
        const btn = document.getElementById('btn');

        const act = () => {
            let val = parseInt(a.value);

            if(val <= 3) {
                console.log('a weak number');
            } else if(val <= 6) {
                console.log('a strong number');
            } else {
                console.log('a very strong number');
            }
        };

        btn.onclick = act;
    </script>
</body>
</html>
