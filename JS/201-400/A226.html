<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text" id="inp">

    <hr>

    <span id="a"></span>

    <script>
        const inp = document.getElementById('inp');
        const a = document.getElementById('a');

        function aaa() {
            a.innerText = inp.value;
        }

        inp.onkeyup = aaa;
    </script>
</body>
</html>
