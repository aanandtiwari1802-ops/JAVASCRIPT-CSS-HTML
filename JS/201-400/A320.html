    <h1>Index Page</h1>

    <hr>

    <script>
        const x = [25, 10, 65, 32, 71, 48, 59, 4];

        const y = [];
        
        for(i = 0; i < x.length; i++) {
            if(x[i] % 2 == 0) {
                y.push(x[i]);
                continue;
            }
            
            console.log(x[i]);
        }
        
        console.log(x);
        console.log(y);
    </script>
