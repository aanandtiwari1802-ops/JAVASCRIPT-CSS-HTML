<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Index Page</h1>

    <hr>

    <script>
        const x = [2, 5, 7, 2, 8, 9, 10, 2, 5, 4, 9, 13, 2, 4, 7, 2, 9, 5, 3, 2, 7];

        const y = [];        

        for(i = 0; i < x.length; i++) {
            let flag = true;
            for(j = 0; j < y.length; j++) {
                if(x[i] == y[j]) {
                    flag = false;
                    break;
                }
            }
            
            if(flag) {
                y.push(x[i]);
            }
        }

        for(j = 0; j < y.length; j++) {
            let count = 0;
            for(i = 0; i < x.length; i++) {
                if(y[j] == x[i])
                    count++;
            }

            console.log(`${y[j]} - ${count}`);
        }

    </script>
</body>
</html>
