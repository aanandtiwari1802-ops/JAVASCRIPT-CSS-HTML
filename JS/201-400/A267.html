<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Index Page</h1>

    <hr>

    Enter a Number: <input type="number" id="a"> <br><br>

    <input type="button" id="btn" value="Save">

    <script>
        const a = document.getElementById('a');
        const btn = document.getElementById('btn');


        const act = function () {
            let n = parseInt(a.value);
            
            for(i=1;i<=n;i++) {
                console.log(i);
            }
        };

        btn.onclick = act;
    </script>
</body>
</html>
