    <h1>Index Page</h1>

    <hr>

    <script>
        /*
            Compound Assignment Operators:
            ------------------------------

                +=    -  addition equals  (addition assignment)

                -=    -  subtraction equals

                *=    -  multiplication equals

                /=    -  division equals   

                %=    -  modulus equals

                **=   -  exponentiation equals

                &&=   -  logical and equals

                ||=   -  logical or equals

                &=    -  bitwise and equals

                |=    -  bitwise or equals

                ^=    -  xor equals

                <<=   -  left shift equals

                >>=   -  right shift equals  (right shift assignment)
        */
    </script>
</body>
