    <script>
        // Comparison(Relational) Operator:   (Binary Operator)

        /*
        
                <    -    is less than

                >    -    is greater than

                <=   -    is less than or equal to 

                >=   -    is greater than or equal to

                ==   -    equality operator (is equal to)

                !=   -    inequality operator  (is not equal to)

                ===  -   strict equality operator

                !==  -   strict inequality operator 


                Relational Expression:

                    <operand1>  <Relational Operator>  <operand2>  =>  true/false(boolean)

                    ex: 
                            2    <    3   =>  2 is less than 3  => true
        
        */
    </script>
