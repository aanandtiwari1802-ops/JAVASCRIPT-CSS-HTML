<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Some Text</h1>

    <hr>

    <script>
        // Integer Constants

        let a = 23;     // decimal integer constant
        let b = 0b111;  // binary integer constant
        let c = 0o23;   // octal integer constant
        let d = 0xa1;   // hexadecimal integer constant

        console.log(a);  // 23
        console.log(b);  // 7
        console.log(c);  // 19
        console.log(d);  // 161

    </script>
</body>
</html>
