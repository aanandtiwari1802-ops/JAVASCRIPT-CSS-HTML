    <h1>Index pAge</h1>

    <hr>

    <script>
        // Bitwise Right Shift Assignment operator(Bitwise right shift equals):  <<=

        let a = 32;
        let b = 3;

        console.log(a);
        
        // a = a >> b;
        a >>= b;

        console.log(a);

    </script>
