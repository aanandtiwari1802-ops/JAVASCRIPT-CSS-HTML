    <script>
        class Student {
            constructor(name, age, maxAge) {
                this.name = name;
                this.age = age;
                this.maxAge = maxAge;
            }
        }

        const a = new Student('Jay', 12, 20);
        const b = new Student('Vijay', 17, 20);
        const c = new Student('Parajay', 9, 20);

        console.log(a);
        console.log(b);
        console.log(c);
    </script>
