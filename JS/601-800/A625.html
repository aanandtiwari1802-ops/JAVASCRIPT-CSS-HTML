<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body {
            font-family: verdana;
            color: #333;
        }

        table {
            border: 1px solid #999;
            border-collapse: collapse;
            box-shadow: 5px 5px 15px #999;
        }

        thead {
            color: rgb(9, 145, 148);
            font-size: 20px;
            background-color: beige;
        }

        thead th {
            padding: 20px;
        }
        
        td {
            padding: 20px;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            border: 1px solid #eee;
        }

        td:hover {
            background-color: rgb(22, 95, 159);
            color: #fff;
        }
    </style>
</head>
<body>
    <table align="center">
        <thead>
            <tr>
                <th>Sun</th>
                <th>Mon</th>
                <th>Tue</th>
                <th>Wed</th>
                <th>Thu</th>
                <th>Fri</th>
                <th>Sat</th>
            </tr>
        </thead>
        <tbody>
            
        </tbody>
    </table>

    <script>
        const tbody = document.querySelector('tbody');

        let i = 0;
        let flag = 0;

        // set first date of the month
        let dt = new Date();
        dt.setDate(1);

        // get day of the first date of the month
        let day = dt.getDay();
        let month = dt.getMonth();

        while(true) {
            let row = tbody.insertRow(i);
            let end = 0;

            for(let j=0; j<7; j++) {
                let cell = row.insertCell(j);
                
                if(i == 0 && j == day) {
                    flag = 1;
                }

                if(flag) {
                    cell.innerText = dt.getDate();
                    dt.setDate(dt.getDate()+1);
                    if(dt.getMonth() > month) {
                        flag = 0;
                        end = 1;
                    }
                }    
            }

            i++;
            if(end) 
                break;
        }

    </script>
</body>
</html>
