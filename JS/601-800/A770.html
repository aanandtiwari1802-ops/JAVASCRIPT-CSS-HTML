<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Index Page</h1>

    <hr>

    <script>
        // Rest Operator
        function pro(...x) {
            for(let next of x) {
                for(let prop in next) {
                    console.log(prop, next[prop]);
                }
                console.log('##########################')
            }
        }

        const obj1 = {name: 'jay', age: 21, college: 'global'};
        const obj2 = {name: 'jay', age: 21, company: 'tcs', salary: 1200000, experience: 5};

        pro(obj1, obj2);
    </script>
</body>
</html>
