<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Index Page</h1>

    <hr>

    <script>
        class Student {
            constructor(name, age, email, degree, branch, semester) {
                this.name = name;
                this.age = age;
                this.email = email;
                this.degree = degree;
                this.branch = branch;
                this.semester = semester;
            }
        }

        class Teacher {
            constructor(name, age, email, qualification, experience, salary) {
                this.name = name;
                this.age = age;
                this.email = email;
                this.qualification = qualification;
                this.experience = experience;
                this.salary = salary;
            }
        }

        const x = new Student('Om', 21, 'om@gmail.com', 'BTech', 'CS', '4th');
        const y = new Teacher('Mr Rao', 62, 'rao@gmail.com', 'PHd', 30, 172000);

        console.log(x);
        console.log(y);

    </script>
</body>
</html>
