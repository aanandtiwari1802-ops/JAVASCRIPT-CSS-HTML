<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Index Page</h1>

    <hr>

    <button type="button" id="btn">Action</button>

    <script>
        const btn = document.querySelector('#btn');

        // function constructor -----
        function Student(name, age, college, degree) {
            this.name = name;
            this.age = age;
            this.college = college;
            this.degree = degree;

            // this.showInfo = function() {
            //     console.log(`My Name: ${this.name}, Age: ${this.age}, College: ${this.college} and Degree: ${this.degree}`)
            // };
        }

        console.log(Student.prototype, '#######');

        btn.addEventListener('click', () => {
            Student.prototype.showInfo = function() {
                console.log(`My Name: ${this.name}, Age: ${this.age}, College: ${this.college} and Degree: ${this.degree}`)
            };

            console.log(Student.prototype, '#######');
        });

    </script>
</body>
</html>
