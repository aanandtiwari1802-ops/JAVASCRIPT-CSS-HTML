<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Index Page</h1>

    <hr>

    <script>

        // Rest Operator...
        function pro(...x) {            
            console.log(x);
        }

        pro();
        console.log('~~~~~~~~~~~~~')
        pro(12);
        console.log('~~~~~~~~~~~~~')
        pro(34, 56);
        console.log('~~~~~~~~~~~~~')
        pro(34, 56, 78);
    </script>
</body>
</html>
