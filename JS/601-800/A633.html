<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        #box {
            position: relative;
        }

        #sh {
            /* border: 1px solid #333; */
            height: 200px;
            width: 4px;
            position: absolute;
            left: 750px;
            top: 100px;
        }

        #sh_inner {
            /* border: 1px solid red; */
            height: 100px;
        }
        
        #mh {
            /* border: 1px solid green; */
            height: 200px;
            width: 2px;
            position: absolute;
            left: 750px;
            top: 100px;
        }

        #mh_inner {
            /* border: 1px solid #333; */
            height: 100px;
        }
        
        #hh {
            /* border: 1px solid green; */
            height: 200px;
            width: 4px;
            position: absolute;
            left: 750px;
            top: 100px;
        }

        #hh_inner {
            /* border: 1px solid green; */
            /* background-color: green; */
            height: 100px;
        }

        #clk {
            position: absolute;
            left: 600px;
            top: 50px;
        }

        [type='number'] {
            font-size: 22px;
            width: 70px;
        }

        #change_time {
            font-size: 20px;
            padding: 3px 12px;
        }
    </style>
</head>
<body>
    <div style="text-align: center;font-size: 22px;padding-top:80px">
        <input type="number" id="rhh" placeholder="HH"> : 
        <input type="number" id="rmh" placeholder="mm"> :
        <input type="number" id="rsh" placeholder="ss"> &nbsp;
        <input type="button" value="Set" id="change_time">
    </div>
    <div id="box">
        <img src="clock.png" width="300" id="clk">
        <div id="sh">
            <div id="sh_inner">
                <img src="ss.png" height="100">
            </div>
        </div>

        <div id="mh">
            <div id="mh_inner">
                <img src="mm.png" height="90" style="margin-top: 10px">
            </div>
        </div>
        
        <div id="hh">
            <div id="hh_inner">
                <img src="hh.png" height="60" style="margin-top: 40px">
            </div>
        </div>
    </div>

    <script>
        const change_time = document.querySelector('#change_time');
        const rhh = document.querySelector('#rhh');
        const rmh = document.querySelector('#rmh');
        const rsh = document.querySelector('#rsh');

        const sh = document.querySelector('#sh');
        const mh = document.querySelector('#mh');
        const hh = document.querySelector('#hh');

        let shDeg = 0;
        let mhDeg = 0;
        let hhDeg = 0;

        // ------------------------------
        change_time.addEventListener('click', () => {
            shDeg = rsh.value * 6;
            sh.style.rotate = shDeg+'deg';

            mhDeg = rmh.value * 6;
            mh.style.rotate = mhDeg + 'deg'; 

            hhDeg = rhh.value * 30
        });
        // ------------------------------

        setInterval(() => {
            shDeg += 6;
            if(shDeg == 360) {
                shDeg = 0;
                mhDeg += 6;
                mh.style.rotate = mhDeg+'deg';
                console.log(mhDeg)
                if(mhDeg % 12 == 0) {
                    hhDeg += 1;
                    hh.style.rotate = hhDeg+'deg';
                    console.log(hhDeg)
                }
                if(mhDeg == 360) {
                    mhDeg = 0;
                }
            }
            sh.style.rotate = shDeg+'deg';
        }, 1000);
    </script>
</body>
</html>
