<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Index Page</h1>

    <hr>

    <script>
        class Student {
            constructor(name, age, college, degree) {
                this.name = name;
                this.age = age;
                this.college = college;
                this.degree = degree;
            }

            showInfo() {
                console.log(`My Name: ${this.name}, Age: ${this.age}, College: ${this.college} and Degree: ${this.degree}`)
            };

            login() {
                console.log('logged in');
            }
        }

        const x = new Student('Rajesh', 23, 'srit', 'Mtech');
        const y = new Student('Manoj', 18, 'global', 'Btech');
        
        x.showInfo();
        y.showInfo();
    </script>
</body>
</html>
