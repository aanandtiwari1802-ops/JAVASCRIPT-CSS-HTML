    <h1>Index Page</h1>

    <hr>

    <script>
       
        class Student {            
            // Constructor is involved in instantiation(object/instance creation)
            // Constructor's job is, initialization of an instance
            constructor(name, age, company) {
                this.name = name;
                this.age = age;
                this.company = company;
                console.log('~~~~~~ ***** ~~~~~~')
            }
        }
       
        const x = new Student('Yamraj', 1000, 'Yamlok');
        const y = new Student('Indra', 100, 'SwargLok');

        console.log(x);
        console.log(y);

    </script>
