<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Index Page</h1>

    <hr>

    <script>
        class Student {
            // class level variable (common or shared amongst all the objects of class Student)
            max_age = 20;

            constructor(name, age) {
                // instance level variables...
                this.name = name;
                this.age = age;
            }
        }

        const a = new Student('Jay', 12);
        const b = new Student('Vijay', 17);
        const c = new Student('Parajay', 9);

        console.log(a.name, a.age, a.max_age);
        console.log(b.name, b.age, b.max_age);
        console.log(c.name, c.age, c.max_age);
    </script>
</body>
</html>
