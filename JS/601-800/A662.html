<body>
    <h1>Index Page</h1>

    <hr>

    <script>
        const x = {
                    name: 'deepak', 
                    age: 21, 
                    college: 'iitdm',
                    login() {
                        console.log('the user is logged in... ****');
                    },
                    logout() {
                        console.log('the user is logged out... ****');
                    }
                  };

        for(let prop in x) {
            if((typeof x[prop]) == 'function') {
                console.log('Hello')
            } else {
                console.log('Hi')
            }          
        }
    </script>
