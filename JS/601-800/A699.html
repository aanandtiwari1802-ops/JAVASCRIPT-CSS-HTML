<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Index Page</h1>

    <hr>

    <script>
        class A {
            constructor() {
                console.log('parent constructor');
            }
        }

        class B extends A {
            constructor() {
                super();
                console.log('child constructor');
            }
        }

        const x = new B();

        console.log(x);

    </script>
</body>
</html>
