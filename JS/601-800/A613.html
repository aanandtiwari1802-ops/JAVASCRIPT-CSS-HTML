<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        #calc {
            width: 290px;
            /* height: 500px; */
            border: 2px solid rgb(102, 170, 237);
            border-radius: 7px;
            margin: 70px auto;
            padding: 10px;
            box-shadow: 5px 5px 15px rgb(102, 170, 237);
        }

        #screen {
            /* height: 70px; */
            border: 2px solid rgb(102, 170, 237);
            border-radius: 7px;
            margin-bottom: 5px;
            text-align: right;
            font-size: 22px;
            font-weight: bold;
            font-family: verdana;
            /* padding: 15px; */
            color: rgb(76, 134, 193);
            padding-right: 10px;
        }

        #keypad {
            /* height: 300px; */
            /* border: 2px solid rgb(91, 79, 79); */
            border-radius: 7px;
        }

        td {
            color: rgb(76, 134, 193);
            font-size: 22px;
            font-weight: bold;
            font-family: verdana;
            height: 50px;
            text-align: center;
            width: 25%;
            cursor: pointer;
            border: 1px solid rgb(102, 170, 237);
        }

        td:hover {
            background-color: rgb(185, 209, 235);
            color: green;
        }

        /* tbody td {
            background-color: red;
            color: white;
        } */

        .click {
            box-shadow: 1px 1px 5px rgb(102, 170, 237);
        }
    </style>
</head>
<body>
    <div id="calc">
        <div id="keypad">
            <table width="100%" cellspacing="10">
                <thead>
                    <tr>
                        <td colspan="4" id="screen"></td>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>C</td>
                        <td><img src="back.png" height="24px"></td>
                        <td><font face="times new roman">X<sup>y</sup></font></td>
                        <td>+</td>
                    </tr>
                    <tr>
                        <td>1</td>
                        <td>2</td>
                        <td>3</td>
                        <td>-</td>
                    </tr>
                    <tr>
                        <td>4</td>
                        <td>5</td>
                        <td>6</td>
                        <td>*</td>
                    </tr>
                    <tr>
                        <td>7</td>
                        <td>8</td>
                        <td>9</td>
                        <td>/</td>
                    </tr>
                    <tr>
                        <td>0</td>
                        <td>.</td>
                        <td>=</td>
                        <td>%</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>

        const screen = document.querySelector('#screen');
        const tbody = document.querySelector('tbody');

        let expression = '';
        let expStack = new Array();

        const click = new Audio('click.mp3');

        const rows = Array.from(tbody.rows);
        rows.forEach((row)=>{
            const cells = Array.from(row.cells);
            cells.forEach((cell)=>{
                cell.className = 'click';
            });
        });

        tbody.addEventListener('mousedown', (e) => {
            const btn = e.target.closest('td');

            if(btn) {                
                btn.classList.toggle('click');
            }
        });
        
        tbody.addEventListener('mouseup', (e) => {
            const btn = e.target.closest('td');

            if(btn) {                
                btn.classList.toggle('click');
            }
        });

        const handleRepeatOperator = (btn) => {
            let ch = btn.innerText;
            if(expStack.length != 0) {
                let top = expStack.pop();
                if('1234567890.'.includes(top)) {
                    if(ch == '0' && top == '0' && expStack.length==0) {
                        expStack.push('0');
                    } else if(ch == '.' && (top == '.' || expStack.toString().includes('.'))) {
                        expStack.push(top);
                    } else {
                        expStack.push(top);
                        expStack.push(ch);
                    }
                } else {
                    if(ch.startsWith('<font') && '+-*/%'.includes(top)) {
                        expStack.push('^');
                    } else if('+-*/%'.includes(top) && '+-*/%'.includes(ch)) {
                        expStack.push(ch);
                    } else {
                        expStack.push(top)
                        expStack.push(ch)
                    }
                }
                
            } else if('1234567890.'.includes(ch)) {
                expStack.push(ch)
            }

            // console.log(expStack.join(''))

            return expStack.join('');
        };

        tbody.addEventListener('click', (e) => {
            let btn = e.target.closest('td');

            if(btn) {
                click.play();
            }

            if(btn && btn.innerHTML.startsWith('<font')) {
                // expression += '^';
                expression = handleRepeatOperator(btn);                
                screen.innerText = expression;
            } else if(btn && btn.innerHTML.startsWith('<img')) {
                if(expression.length != 0) {
                    expression = expression.substring(0, expression.length-1)
                    screen.innerText = expression;
                    expStack.pop();
                } 
            } else if(btn && btn.innerText == 'C') {
                screen.innerText = '';
                expression = '';
                while(expStack.length)
                    expStack.pop()
            } else if(btn && btn.innerText == '=') {
                if(expression) {
                    expression = expression.replaceAll('^', '**');
                    screen.innerText = eval(expression);
                }
                expression = '';
                while(expStack.length)
                    expStack.pop()
            } else if(btn) {
                // expression += btn.innerText;
                expression = handleRepeatOperator(btn);
                screen.innerText = expression;
            }
        });
    </script>
</body>
</html>
