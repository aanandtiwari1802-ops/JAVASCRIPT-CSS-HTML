<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Index Page</h1>

    <hr>

    <script>
        // Serializtion: Object to String
        // Deserialization: String to Object
        //---------------------------------

        // JSON: JavaScript Object Notation
        // Serializtion
        // JSON.stringify(): JS Object => JSON String

        const obj = {name: 'ratan', age: 32, company: 'TCS'};

        console.log(obj, typeof obj);

        const jsonString = JSON.stringify(obj);

        console.log(jsonString, typeof jsonString);
    </script>
</body>
</html>
