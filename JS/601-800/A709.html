<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Index Page</h1>

    <hr>

    <script>
        class A {
            //method overloading... not supported
            pro(a, b) {
                console.log('no parameterized pro first function...');
            }

            pro(a, b, c) {
                console.log('no parameterized pro second function...');
            }

            pro() {
                console.log('no parameterized pro third function...');
            }
        }

        const x = new A();

        x.pro(23, 34, 56);

    </script>
</body>
</html>
