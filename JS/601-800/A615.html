<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        #sh {
            /* border: 1px solid #333; */
            height: 200px;
            width: 0px;
            margin: 100px auto;
            /* rotate: 90deg; */
        }

        #shinner {
            border: 1px solid red;
            height: 100px;
        }
    </style>
</head>
<body>
    <div id="sh">
        <div id="shinner"></div>
    </div>

    <script>
        const sh = document.querySelector('#sh');

        let shDeg = 0;

        setInterval(() => {
            shDeg += 6;
            sh.style.rotate = shDeg+'deg';
        }, 1000);
    </script>
</body>
</html>
