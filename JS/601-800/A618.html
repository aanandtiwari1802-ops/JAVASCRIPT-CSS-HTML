<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body {
            font-family: verdana;
            color: #333;
        }

        table {
            border: 1px solid #999;
            border-collapse: collapse;
            box-shadow: 5px 5px 15px #999;
        }

        thead {
            color: rgb(9, 145, 148);
            font-size: 20px;
            background-color: beige;
        }

        th {
            padding: 20px;
            font-size: 20px;
            border: 1px solid #eee;
        }

        th:hover {
            background-color: rgb(22, 95, 159);
            color: #fff;
        }
    </style>
</head>
<body>
    <table align="center">
        <thead>
            <tr>
                <th>Sun</th>
                <th>Mon</th>
                <th>Tue</th>
                <th>Wed</th>

                <th>Fri</th>

                <th>3</th>
                <th>4</th>
                <th>5</th>
                <th>6</th>
                <th>7</th>
            </tr>
            <tr>
                <th>8</th>
                <th>9</th>
                <th>10</th>
                <th>11</th>
                <th>12</th>
                <th>13</th>
                <th>14</th>
            </tr>
            <tr>
                <th>15</th>
                <th>16</th>
                <th>17</th>
                <th>18</th>
                <th>19</th>
                <th>20</th>
                <th>21</th>
            </tr>
            <tr>
                <th>22</th>

                <th>24</th>
                <th>25</th>

                <th>27</th>
                <th>28</th>

            <tr>
                <th>29</th>

                <th>31</th>
                <th></th>
                <th></th>
                <th></th>
                <th></th>
            </tr>
        </tbody>
    </table>
</body>
</html>
