<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Index Page</h1>

    <hr>

    <table align="center" width="50%" border="1">
        <tr>
            <td align="right">ID:</td>
            <td><input type="text" id="id"></td>
        </tr>
        <tr>
            <td align="right">User ID:</td>
            <td><input type="text" id="uid"></td>
        </tr>
        <tr>
            <td align="right">Title:</td>
            <td><input type="text" id="title"></td>
        </tr>
        <tr>
            <td align="right">Completed:</td>
            <td><input type="text" id="completed"></td>
        </tr>
    </table>

    <button type="button" id="btn">Click Me</button>

    <hr>

    <div id="box"></div>

    <input type="button" value="Show" id="img_btn">

    <script>
        const box = document.querySelector('#box'); 
        const img_btn = document.querySelector('#img_btn'); 

        const networkRequest = async (url, func) => {
            console.log('network request....')
            const response = await fetch(url);    
            const result = await response.json();
            
            func(result);
        };

        
        const handleImageRsponse = (result) => {
            const img = document.createElement('img');
            img.src = result[0].download_url;
            img.style.height = '200px';
            box.append(img);
        };
        
        // const getAnImage = async (url, func) => {
        //     const response  = await fetch(url);
        //     const result = await response.json();

        //     func(result);
        // };

        img_btn.addEventListener('click', () => {
            // getAnImage('https://picsum.photos/v2/list?page=1&limit=1', handleImageRsponse);
            networkRequest('https://picsum.photos/v2/list?page=1&limit=1', handleImageRsponse);
        });

        // ------------------- x -----------------------

        const id = document.querySelector('#id');
        const uid = document.querySelector('#uid');
        const title = document.querySelector('#title');
        const completed = document.querySelector('#completed');

        const btn = document.querySelector('#btn');

        const handleRecordResponse = (result) => {
            id.value = result.id;
            uid.value = result.userId;
            title.value = result.title;
            completed.value = result.completed;
        };

        // const bringARecord = async (url, func) => {
        //     const response = await fetch(url);    
        //     const result = await response.json();
            
        //     func(result);
        // };

        
        let i = 1; 
        btn.addEventListener('click', ()=>{
            // bringARecord('https://jsonplaceholder.typicode.com/todos/' + i++, handleRecordResponse);
            networkRequest('https://jsonplaceholder.typicode.com/todos/' + i++, handleRecordResponse);
        });
    </script>
</body>
</html>
