<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css">
</head>
<body>
    <h1>Index Page</h1>

    <hr>

    <table border="1" align="center" class="table table-striped table-hover w-75">
        <thead>
            <tr>
                <th>Id</th>
                <th>User Id</th>
                <th>Title</th>
                <th>Completed</th>
            </tr>
        </thead>
        <tbody id="records">

        </tbody>
    </table>    
    
    <div class="text-center">
        <input type="button" value="Prev" id="prev" class="btn btn-success">
        <input type="button" value="Next" id="next" class="btn btn-danger">
    </div>

    <script>
        const prev = document.querySelector('#prev');
        const next = document.querySelector('#next');
        const records = document.querySelector('#records');
      

        let curStart = 1;

        const sendRequest = (start) => {
            console.log(start)
            records.innerHTML = '';
            let i = 0;
            
            for(n = start; n < start + 10; n++) {
                const req = new XMLHttpRequest();

                req.open('GET', 'https://jsonplaceholder.typicode.com/todos/' + n, false);
    
                req.addEventListener('readystatechange', () => {
                    if(req.readyState == 4 && req.status == 200) {
                        const obj = JSON.parse(req.responseText);
    
                        const row = records.insertRow(i++);
                        let j = 0;
                        for(let prop in obj) {
                            const cell = row.insertCell(j++);
                            cell.innerText = obj[prop];
                        }
                    }
                });
    
                req.send(null);
            }

            curStart += 10;
        };

        
        
        next.addEventListener('click', () => {
            sendRequest(curStart);           
        });
        
        prev.addEventListener('click', () => {
            if(curStart-20 > 0) {
                curStart -= 20;
                sendRequest(curStart);
            } else {
                alert('No More records...')
            }
        });

        
    </script>
</body>
</html>
