<body>

    <hr>

    <script>
        
        const a = new Date(2023, 9, 18, 16);  // (yyyy, MM, dd, HH)
        const b = new Date(2023, 9, 18, 16, 30);  // (yyyy, MM, dd, HH, mm)
        const c = new Date(2023, 9, 18, 16, 30, 54);  // (yyyy, MM, dd, HH, mm, ss)
        const d = new Date(2023, 9, 18, 16, 30, 54, 567);  // (yyyy, MM, dd, HH, mm, ss, millis)

        console.log(a);
        console.log(b);
        console.log(c);
        console.log(d);
    </script>
