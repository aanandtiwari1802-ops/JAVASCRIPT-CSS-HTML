<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        button {
            margin-left: 20px;
            font-size: 22px;
            padding: 5px 12px;
            cursor: pointer;
        }

        .common {
            border: 3px solid #444;
            height: 400px;
            padding: 10px;
            border-radius: 10px;            
        }

        .active {
            border-color: green;            
            box-shadow: 10px 10px 25px green;
        }

        .inactive {
            border-color: red;
            box-shadow: 10px 10px 25px red;
        }
    </style>
</head>
<body>
    <img src="nobita.jpg" class="common" id="img">

    <script>
        const img = document.querySelector('#img');

        img.addEventListener('mouseover', () => {
            img.className = 'common active';
        });

        img.addEventListener('mouseout', () => {
            img.className = 'common inactive';
        });

        img.addEventListener('click', () => {
            img.className = 'common';
        });
    </script>
</body>
</html>
