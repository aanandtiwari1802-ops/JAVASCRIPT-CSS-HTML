<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        #x {
            border: 4px solid red;
            padding: 10px;
        }

        .a {
            width: 100px;
            height: 100px;
            border-width: 3px;
            border-style: solid;
            border-color: green;
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div id="x">
        
    </div>

    <button id="btn">Show</button>

    <script>
        const x = document.querySelector('#x');
        const btn = document.querySelector('#btn');

        const arr = ['nobita.jpg','gian.jpg','sizuka.jpg','doraemon.jpg','ninja.jpeg','shinchan.jpg'];

        btn.addEventListener('click', () => {
            for(let next of arr) {
                let obj = document.createElement('img');
                obj.src = next;
                obj.classList.add('a');

                x.append(obj);
            }
        });
    </script>
</body>
</html>
