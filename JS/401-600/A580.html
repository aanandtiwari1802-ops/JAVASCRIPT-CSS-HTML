<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        #x {
            border: 4px solid red;
            padding: 10px;
        }

        .a {
            width: 100px;
            height: 100px;
            border-width: 3px;
            border-style: solid;
            border-color: green;
            display: inline-block;
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div id="x">
        
    </div>

    <button id="btn">Add</button>

    <script>
        const x = document.querySelector('#x');
        const btn = document.querySelector('#btn');

        btn.addEventListener('click', () => {
            let obj = document.createElement('div');  // argument: 'tag-name'
            obj.classList.add('a');
            x.append(obj);
        });
    </script>
</body>
</html>
