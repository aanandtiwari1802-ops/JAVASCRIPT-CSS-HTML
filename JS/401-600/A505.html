<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>
    <h1>Index Page</h1>

    <hr>

    <script>
        
        
        // const a = new Date(2023, 9, 18, 16, 30, 54, 567);  // (yyyy, MM, dd, HH, mm, ss, millis)

        const a = new Date();

        console.log(a);
        console.log('~~~');
        console.log('Date: ', a.getDate());
        console.log('Month: ', a.getMonth());
        console.log('Year(yy): ', a.getYear());
        console.log('Year(yyyy): ', a.getFullYear());
        console.log('Hours: ', a.getHours());
        console.log('Minutes: ', a.getMinutes());
        console.log('Day: ', a.getDay());
        console.log('Millis: ', a.getTime());
    </script>
</body>
